# Production Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/event_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Initialize database with data.sql
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=eventSecretKeyForTicketBookingSystemWithQRCodeValidation2024ProductionKey
jwt.expiration=86400000

# Server Configuration
server.port=8081

# Logging Configuration
logging.level.com.event=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration
spring.application.name=Event Ticket System

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# Database Configuration
# MySQL Database (Production)
spring.datasource.url=jdbc:mysql://localhost:3306/event_tickets_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Password

# H2 Database (Development) - File based for persistence
# spring.datasource.url=jdbc:h2:file:./data/eventdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# spring.h2.console.enabled=true
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=eventSecretKeyForTicketBookingSystemWithQRCodeValidation2024
jwt.expiration=86400000

# Server Configuration
server.port=8081

# Logging
logging.level.com.event=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB